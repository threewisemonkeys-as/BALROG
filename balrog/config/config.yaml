agent: 
  type: robust_cot       # Type of agent to use (e.g., 'naive', 'cot', etc.)
  remember_cot: True     # Whether the agent should remember its reasoning across turns
  max_text_history: 4   # Maximum number of text messages to keep in the history
  max_image_history: 0   # Maximum number of images to keep in the history
  max_cot_history: 4    # Maximum number of chain-of-thought steps to keep in history (if using 'cot' type of agent)
  max_icl_history: 1000   # Maximum number of ICL steps to keep in history (if using 'few_shot' type of agent)
  cache_icl: False

client:
  client_name: openrouter           # LLM client to use (e.g., 'openai', 'gemini', 'claude')
  model_id: google/gemini-2.5-flash              # Model identifier (e.g., 'gpt-4', 'gpt-3.5-turbo')
  # client_name: deepseek           # LLM client to use (e.g., 'openai', 'gemini', 'claude')
  # model_id: deepseek-chat
  base_url: http://localhost:8080/v1   # Base URL for the API (if using a local server)
  generate_kwargs:
    temperature: 0.0            # Sampling temperature. If null the API default temperature is used instead
    max_tokens: 4096            # Max tokens to generate in the response
  thinking_budget: null         # Thinking budget. Set to a number of tokens to control.
  timeout: 60                   # Timeout for API requests in seconds
  max_retries: 5                # Max number of retries for failed API calls
  delay: 2                      # Exponential backoff factor between retries in seconds
  alternate_roles: False        # Whether the client requires alternating between the agent and the environment

envs:
  names: minihack   # Environments to evaluate, separated by hyphens
  env_kwargs:
    seed: null                # Random seed; null means a random seed is used
  nle_kwargs:
    character: "@"            # Character representing the agent in NLE
    max_episode_steps: 500  # Max steps per episode in NLE
    no_progress_timeout: 150    # Timeout for no progress in NLE
    savedir: null               # Directory to save NLE data; null disables saving
    save_ttyrec_every: 0        # Frequency of saving TTY recordings
    skip_more: True            # Whether to skip the 'more' prompt in NLE
    include_lang_obs: False     # Whether to include language observations in the observation
    include_perc_obs: False     # Whether to include perceptual features from perc.py in the observation
    use_textual_desc: False
  minihack_kwargs:
    character: "@"
    max_episode_steps: 50
    penalty_step: -0.01
    penalty_time: 0.0
    penalty_mode: constant
    savedir: null
    save_ttyrec_every: 0
    # autopickup: False
    skip_more: True
    include_lang_obs: False
    include_perc_obs: False     # Whether to include perceptual features from perc.py in the observation
    use_textual_desc: False
  babyai_kwargs:
    num_dists: 0                
  crafter_kwargs:
    area: [64, 64]              
    view: [9, 9]                
    size: [256, 256]            # Image size in Crafter
    reward: True                            
    seed: null                  
    max_episode_steps: 2000
    unique_items: True # False
    precise_location: False # True
    skip_items: [] # ["grass", "sand", "path"]
    edge_only_items: [] # ["water", "lava"]
  textworld_kwargs:
    objective: True             
    description: True           
    score: True                 
    max_score: True             
    won: True                   
    max_episode_steps: 80       
    textworld_games_path: tw_games  
  babaisai_kwargs: 
    add_ruleset: True

