hydra:
  run:
    dir: .                     # Set the working directory to the current directory
  output_subdir: null          # Do not use an output subdirectory
  job_logging:
    root:
      handlers: [console]      # Disable Hydra's default file handler (main() sets up its own)

offline:
  mode: "knowledge"          # "knowledge" | "both" | "policy"
  trajectories_dir: null     # Path to CSV+JSON trajectory files
  initial_beliefs_path: null # Starting beliefs file (world_knowledge + optional policy)
  world_knowledge_path: null # For "policy" mode
  objective: ""              # For "policy" mode
  num_steps: 10
  batch_size: 10              # Trajectories per batch (knowledge/both)
  num_refinements: 1         # LLM refinement passes per step (each feeds into the next)
  output_dir: "logs/offline"
  resume_from: null

eval:
  output_dir: "logs/dev/apr8"
  resume_from: null
  num_workers: 32
  num_episodes: 20
  max_steps_per_episode: null
  save_trajectories: True
  save_images: False
  icl_episodes: 1
  icl_dataset: records
  feedback_on_invalid_action : True
  beliefs_path: null
  perception_path: null
  instruction_prompt: null
  perception_prompt: null
  beliefs_in_system_prompt: False
  mode: "eval"

  evolve:
    num_steps: 5
    num_experiments: 10
    rollouts_per_step: 1
    num_baseline_rollouts: 1
    improve_mode: "both"
    two_step: true
    include_experiment_summary: false
    perc_example_max_trajs: 1    # Number of trajectories to sample perception examples from
    perc_example_max_steps: 3    # Number of steps to sample per trajectory
    beliefs_style: "relaxed"
    experiment_mode: "free"
    explore_temp: 1.0            # Temperature for explore rollouts (experiments). Baseline rollouts use client.generate_kwargs.temperature.
    num_trajectories: 1          # Number of trajectories per b_learn step
    num_improve_iterations: 5
    experiments_per_rollout: 1

    # Mixed explore settings
    mixed_explore: false              # Boolean flag to enable mixed_explore.py mode
    num_initial_trajectories: 3       # Baseline rollouts in step 0
    num_trajectories_per_iteration: 3 # Rollouts per step
    num_belief_improvement: 5         # Inner scoring/improvement iterations
    use_qa_pairs: true                # Toggle Q&A pair extraction and scoring
    use_moments: true                 # Toggle critical moment extraction and scoring
    use_raw_observations: true        # Use full raw observations (+ perception) in moment scoring/improvement
    num_perception_improvement: 5     # Inner perception improvement iterations (each sees different examples)
    num_perception_candidates: 3     # Number of parallel perception candidates to evolve (best is selected after all iterations)

    # Stepwise B-learn settings (stepwise_b_learn.py)
    n_environment_steps: 100          # Total env steps budget across all episodes
    max_steps_iterations: 1           # Max improvement turns for track 1b (steps-based beliefs)
    max_perception_iterations: 5      # Max improvement turns for track 1a (perception-only)
    use_qa_improve: true              # Enable track 2 (QA-based improvement)
    use_moments_improve: false         # Enable track 3 (critical moment improvement)
    max_qa_iterations: 5              # Max improvement turns for track 2 (QA-based)
    max_moments_iterations: 1         # Max improvement turns for track 3 (critical moments)
    conversational_improve: true      # true = multi-turn conversations per track; false = independent LLM calls (legacy)
    max_moments_per_forward: 20       # Batch size for moment forward pass
    max_qa_per_forward: 20            # Batch size for QA forward pass
    max_total_moments: 20             # Cap on total accumulated critical moments
    max_total_qa_pairs: 50            # Cap on total accumulated QA pairs
    # num_experiments: 5              # (shared with explore above)
    num_sample_obs: 3                 # Sampled observations for perception validation
    # explore_temp: 1.0               # (shared with explore above)
    artifact_update_interval: 1       # Extract Q&A/moments every N env steps
    improve_interval: 1               # Run 3-track improve loop every N env steps
    experiment_interval: 1           # Generate new experiments every N env steps
    max_steps_context_chars: 50000    # Max chars of step sequence for improvement prompts

